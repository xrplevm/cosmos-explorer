name: Tests

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts-build:
    name: TypeScript build & typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

  go-test:
    name: Go tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Compute diff
        uses: technote-space/get-diff-action@v6.1.2
        id: git_diff
        with:
          SUFFIX_FILTER: |
            .go
            .mod
            .sum

      - name: Build callisto
        if: env.GIT_DIFF != ''
        working-directory: apps/callisto
        run: make build

      - name: Test callisto
        working-directory: apps/callisto
        run: make test-unit stop-docker-test

      - name: Upload coverage
        if: env.GIT_DIFF != ''
        uses: codecov/codecov-action@v4
        with:
          file: apps/callisto/coverage.txt
