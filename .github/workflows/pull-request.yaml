name: "Pull Request"

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ts-lint:
    name: TypeScript lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint --filter='!@cosmos-explorer/juno' --filter='!@cosmos-explorer/callisto-app'

  go-lint:
    name: Go lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Compute diff
        uses: technote-space/get-diff-action@v6.1.2
        with:
          SUFFIX_FILTER: |
            .go
            .mod
            .sum

      - name: Lint juno
        if: env.GIT_DIFF != ''
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: packages/juno
          args: --timeout=10m

      - name: Lint callisto
        if: env.GIT_DIFF != ''
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: apps/callisto
          args: --timeout=10m

  ts-build:
    name: TypeScript build & typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

  go-test:
    name: Go tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Compute diff
        uses: technote-space/get-diff-action@v6.1.2
        with:
          SUFFIX_FILTER: |
            .go
            .mod
            .sum

      - name: Build callisto
        if: env.GIT_DIFF != ''
        working-directory: apps/callisto
        run: make build

      - name: Test juno
        if: env.GIT_DIFF != ''
        working-directory: packages/juno
        run: go test ./... -coverprofile=coverage.txt -covermode=atomic

      - name: Test callisto
        if: env.GIT_DIFF != ''
        working-directory: apps/callisto
        run: make test-unit stop-docker-test

  build-base:
    needs: [ts-lint, ts-build, go-lint, go-test]
    uses: ./.github/workflows/build-base.yaml
    secrets: inherit
    with:
      push: true
      tag: ${{ github.sha }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-build-base
      cancel-in-progress: true

  build-callisto:
    needs: [build-base]
    uses: ./.github/workflows/build-callisto.yaml
    secrets: inherit
    with:
      target: integration
      push: false
      tag: ${{ github.sha }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-build-callisto
      cancel-in-progress: true
