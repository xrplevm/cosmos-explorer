name: "Pull Request"

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      ts: ${{ steps.filter.outputs.ts }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ts:
              - 'apps/explorer/**'
              - 'packages/adapters/**'
              - 'packages/core/**'
              - 'packages/price/**'
              - 'packages/ui/**'
              - 'packages/utils/**'
              - 'packages/playground/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - '.github/workflows/**'
            go:
              - 'apps/callisto/**'
              - 'packages/juno/**'
              - '**/*.go'
              - '**/go.mod'
              - '**/go.sum'
              - '.github/workflows/**'

  ts-lint:
    name: TypeScript lint
    needs: [detect-changes]
    if: needs.detect-changes.outputs.ts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint --filter='!@cosmos-explorer/juno' --filter='!@cosmos-explorer/callisto-app'

  go-lint:
    name: Go lint
    needs: [detect-changes]
    if: needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Lint juno
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: packages/juno
          args: --timeout=10m

      - name: Lint callisto
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: apps/callisto
          args: --timeout=10m

  ts-build:
    name: TypeScript build & typecheck
    needs: [detect-changes]
    if: needs.detect-changes.outputs.ts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

  go-test:
    name: Go tests
    needs: [detect-changes]
    if: needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build callisto
        working-directory: apps/callisto
        run: make build

      - name: Test juno
        working-directory: packages/juno
        run: go test ./... -coverprofile=coverage.txt -covermode=atomic

      - name: Test callisto
        working-directory: apps/callisto
        run: make test-unit stop-docker-test

  build-base:
    needs: [detect-changes, ts-lint, ts-build, go-lint, go-test]
    if: |
      always() &&
      (needs.ts-lint.result == 'success' || needs.ts-lint.result == 'skipped') &&
      (needs.ts-build.result == 'success' || needs.ts-build.result == 'skipped') &&
      (needs.go-lint.result == 'success' || needs.go-lint.result == 'skipped') &&
      (needs.go-test.result == 'success' || needs.go-test.result == 'skipped')
    uses: ./.github/workflows/build-base.yaml
    secrets: inherit
    with:
      push: true
      tag: ${{ github.sha }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-build-base
      cancel-in-progress: true

  build-callisto:
    needs: [detect-changes, build-base]
    if: needs.detect-changes.outputs.go == 'true'
    uses: ./.github/workflows/build-callisto.yaml
    secrets: inherit
    with:
      target: integration
      push: false
      tag: ${{ github.sha }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-build-callisto
      cancel-in-progress: true

  build-explorer:
    needs: [detect-changes, build-base]
    if: needs.detect-changes.outputs.ts == 'true'
    uses: ./.github/workflows/build-explorer.yaml
    secrets: inherit
    with:
      push: false
      target: integration
      tag: ${{ github.sha }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-build-explorer
      cancel-in-progress: true
