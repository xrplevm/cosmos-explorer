version: "2"

run:
  tests: false

linters:
  default: none
  enable:
    - bodyclose
    - dogsled
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - staticcheck
    - unconvert
    - unused
    - unparam
    - nolintlint
  settings:
    dogsled:
      max-blank-identifiers: 3
    nolintlint:
      allow-unused: false
      require-explanation: false
      require-specific: false
  exclusions:
    rules:
      - text: "Use of weak random number generator"
        linters:
          - gosec
      - text: "ST1003:"
        linters:
          - staticcheck
      - text: "ST1016:"
        linters:
          - staticcheck
      - text: "SA1019:"
        linters:
          - staticcheck
      - text: "G304:"
        linters:
          - gosec
      - text: "G104:"
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
